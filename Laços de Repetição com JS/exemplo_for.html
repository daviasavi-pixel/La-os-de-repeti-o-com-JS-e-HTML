<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="for.css">
    <title>Exemplo For com JS</title>
</head>
<body>
    <button onclick="mostrar_numeros()">Mostrar números</button>

    <script>
        function mostrar_numeros(){
            for(let contador = 1; contador <= 5; contador++){
                alert('Número: ' + contador)
            }
        }
    </script>
</body>
</html>
